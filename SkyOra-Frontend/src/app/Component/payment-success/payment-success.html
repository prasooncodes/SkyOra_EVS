<section class="success-page">
  <div class="success-card">
    <div class="success-badge">Payment Complete</div>
    <h1>Thank you for booking with SkyOra</h1>
    <p>Your payment has been processed and your flight is now confirmed.</p>

    <div class="success-actions">
      <button type="button" class="btn btn-primary" (click)="downloadTicket()">Download Ticket</button>
      <a routerLink="/bookingsbyid" class="btn btn-secondary">View My Bookings</a>
    </div>

    <div class="success-tip">
      <strong>Tip:</strong> Your ticket will download directly with the booking details you entered.
    </div>
  </div>
</section>
