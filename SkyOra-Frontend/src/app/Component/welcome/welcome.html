<div class="welcome-container">
  <!-- Hero Section -->
  <section class="hero-section d-flex align-items-center">
    <div class="container">
      <div class="row">
        <div class="col-md-6 text-white animate-fade-in">
          <h1 class="display-3 fw-bold">It's Your Sky</h1>
          <p class="lead mb-4">Experience the warmth of Indian hospitality with SkyOra. Fly to your favorite destinations starting from ₹2,499.</p>
          <button class="btn btn-orange btn-lg shadow" routerLink="/flights">Book My Flight</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Search Bar Overlay -->
  <div class="container search-overlay">
    <div class="card shadow-lg border-0 p-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label text-muted small fw-bold">FROM</label>
          <input type="text" class="form-control border-0 bg-light" placeholder="Delhi (DEL)">
        </div>
        <div class="col-md-3">
          <label class="form-label text-muted small fw-bold">TO</label>
          <input type="text" class="form-control border-0 bg-light" placeholder="Mumbai (BOM)">
        </div>
        <div class="col-md-3">
          <label class="form-label text-muted small fw-bold">DEPARTURE</label>
          <input type="date" class="form-control border-0 bg-light">
        </div>
        <div class="col-md-3">
          <button class="btn btn-purple w-100 py-2" routerLink="/flights">SEARCH FLIGHTS</button>
        </div>
      </div>
    </div>
  </div>
</div>
