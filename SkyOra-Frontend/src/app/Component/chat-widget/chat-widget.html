<!-- Floating Action Button Trigger -->
<button class="chat-fab shadow" (click)="toggleChat()" *ngIf="!isOpen">
  <span class="fab-icon">💬</span>
  <span class="badge bg-danger pulse-dot" *ngIf="hasNewMessage"></span>
</button>

<!-- Main Collapsible Floating Chat Box Widget Drawer container -->
<div class="chat-window-drawer shadow-lg" *ngIf="isOpen">
  <!-- Card Header Block -->
  <div class="chat-header d-flex justify-content-between align-items-center p-3">
    <div class="d-flex align-items-center gap-2">
      <div class="bot-avatar-pulse">🤖</div>
      <div>
        <h6 class="mb-0 text-white fw-bold">SkyOra Assistant</h6>
        <small class="text-white-50 extra-small">Live Concierge</small>
      </div>
    </div>
    <button class="btn-close btn-close-white" (click)="toggleChat()"></button>
  </div>

  <!-- Messages List Display Feed Window Frame -->
  <div class="chat-messages-body p-3" #scrollContainer>
    <div class="message assistant p-3 mb-2 rounded-3">
      Hi! I am your SkyOra Flight Concierge. How can I help you navigate your journeys today? ✈️
    </div>

    @for (msg of chatMessages; track $index) {
      <div class="message p-3 mb-2 rounded-3" [ngClass]="msg.role">
        {{ msg.content }}
      </div>
    }

    @if (isTyping) {
      <div class="message assistant typing-loader p-2 rounded-3">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    }
  </div>

  <!-- Interactive Chat Box Input Control Action Rows Footer -->
  <div class="chat-footer p-2 border-top bg-white d-flex gap-2">
    <input type="text" class="form-control rounded-pill chat-input" 
           placeholder="Ask about flights, hubs..." 
           [(ngModel)]="userPrompt" 
           (keyup.enter)="dispatchPrompt()">
    <button class="btn btn-send-akasa rounded-circle" 
            [disabled]="!userPrompt.trim() || isTyping" 
            (click)="dispatchPrompt()">
      ➔
    </button>
  </div>
</div>
