<div class="skyora-menu-container">
  <!-- Header Section -->
  <header class="menu-header">
    <div>
      <h1 class="cafe-logo">Cafe Skyora</h1>
      <p class="cafe-tagline mb-0">Bites & Brews Under the Cosmic Sky</p>
    </div>
    <button type="button" class="btn btn-dark rounded-pill px-4" (click)="viewCart()">
      View Cart ({{ cartCount() }})
    </button>
  </header>

  <!-- Categories Navigation -->
  <nav class="category-nav">
    <button class="nav-btn active">All</button>
    <button class="nav-btn">Cosmic Brews</button>
    <button class="nav-btn">Galaxy Bites</button>
    <button class="nav-btn">Nebula Desserts</button>
  </nav>

  <!-- Menu Grid -->
  <main class="menu-grid">
    @for (item of menuItems; track item.id) {
      <div class="menu-card">
        <div class="item-image" [style.backgroundImage]="'url(' + item.image + ')'"></div>
        <div class="item-details">
          <div class="item-header">
            <h3 class="item-title">{{ item.name }}</h3>
            <span class="item-price">{{ item.price | currency:'INR':'symbol':'1.0-0' }}</span>
          </div>
          <p class="item-description">{{ item.description }}</p>
          <button type="button" class="add-btn" (click)="addToCart(item)">Add to Order</button>
        </div>
      </div>
    }
  </main>
</div>
